<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Process Scheduling Simulator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Gantt chart block styles for timeline look */
    #gantt-chart {
      display: flex;
      gap: 4px;
      align-items: center;
      border: 1px solid #ccc;
      padding: 8px;
      background: #f0f9ff;
      overflow-x: auto;
      min-height: 50px;
      border-radius: 0.5rem;
    }
    .gantt-block {
      background-color: #2563eb;
      color: white;
      padding: 8px 12px;
      border-radius: 0.375rem;
      font-weight: 600;
      white-space: nowrap;
      user-select: none;
      position: relative;
    }
    .gantt-block::after {
      content: attr(data-time);
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: #555;
      white-space: nowrap;
    }
  </style>
</head>
<body class="bg-gradient-to-r from-blue-100 via-white to-blue-100 min-h-screen p-8 flex flex-col items-center">

  <div class="max-w-5xl w-full bg-white p-8 rounded-3xl shadow-2xl">
    <h1 class="text-4xl font-extrabold text-center mb-8 text-blue-900">Process Scheduling Simulator</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">

      <!-- Input form -->
       
      <div class="space-y-6">
        <div>
          <label for="pid" class="block text-lg font-semibold mb-1">Process ID</label>
          <input id="pid" type="text" placeholder="e.g. P1" class="w-full border border-blue-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>
        <div>
          <label for="bt" class="block text-lg font-semibold mb-1">Burst Time</label>
          <input id="bt" type="number" min="1" placeholder="e.g. 5" class="w-full border border-blue-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>
        <div>
          <label for="at" class="block text-lg font-semibold mb-1">Arrival Time</label>
          <input id="at" type="number" min="0" placeholder="e.g. 0" class="w-full border border-blue-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>
        <div>
          <label for="priority" class="block text-lg font-semibold mb-1">Priority (lower = higher)</label>
          <input id="priority" type="number" min="0" placeholder="e.g. 1" class="w-full border border-blue-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>
        <button onclick="addProcess()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-md hover:bg-blue-700 transition duration-900">Add Process</button>
      </div>
     
<div>
  <button onclick="reset()" class="w-full bg-red-600 text-white font-bold py-3 rounded-md hover:bg-red-700 transition duration-300">
    Reset
  </button>
</div>
      <!-- Algorithm & Simulate -->
      <div class="space-y-6">
        <div>
          <label for="algorithm" class="block text-lg font-semibold mb-1">Algorithm</label>
          <select id="algorithm" class="w-full border border-blue-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <option value="fcfs">FCFS</option>
            <option value="sjf">SJF (Non-preemptive)</option>
            <option value="priority">Priority (Non-preemptive)</option>
            <option value="rr">Round Robin</option>
          </select>
        </div>
        <div>
          <label for="quantum" class="block text-lg font-semibold mb-1">Time Quantum</label>
          <input id="quantum" type="number" value="2" min="1" class="w-full border border-blue-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>
        <button onclick="simulate()" class="w-full bg-green-600 text-white font-bold py-3 rounded-md hover:bg-green-700 transition duration-300">Simulate</button>
      </div>
    </div>
   

    <!-- Add Reset button next to Simulate


    <!-- Process Table -->
    <div class="mt-12">
      <h2 class="text-2xl font-semibold mb-4 text-blue-900">Process Table</h2>
      <table class="w-full table-auto border border-blue-300 rounded-md overflow-hidden">
        <thead class="bg-blue-200 text-blue-900 font-semibold">
          <tr>
            <th class="p-3 border border-blue-300">PID</th>
            <th class="p-3 border border-blue-300">Burst Time</th>
            <th class="p-3 border border-blue-300">Arrival Time</th>
            <th class="p-3 border border-blue-300">Priority</th>
          </tr>
        </thead>
        <tbody id="process-table" class="text-center"></tbody>
      </table>
    </div>

    <!-- Gantt Chart -->
    <div class="mt-12">
      <h2 class="text-2xl font-semibold mb-4 text-blue-900">Gantt Chart</h2>
      <div id="gantt-chart"></div>
    </div>

    <!-- Results Table -->
    <div class="mt-12 mb-16">
      <h2 class="text-2xl font-semibold mb-4 text-blue-900">Results</h2>
      <table class="w-full table-auto border border-blue-300 rounded-md overflow-hidden">
        <thead class="bg-blue-200 text-blue-900 font-semibold">
          <tr>
            <th class="p-3 border border-blue-300">PID</th>
            <th class="p-3 border border-blue-300">Waiting Time</th>
            <th class="p-3 border border-blue-300">Turnaround Time</th>
          </tr>
        </thead>
        <tbody id="result-table" class="text-center"></tbody>
      </table>
    </div>
  </div>

  <script>
    const processes = [];

    function addProcess() {
      const pid = document.getElementById('pid').value.trim();
      const bt = parseInt(document.getElementById('bt').value);
      const at = parseInt(document.getElementById('at').value);
      const priority = parseInt(document.getElementById('priority').value);

      if (!pid) {
        alert('Process ID is required');
        return;
      }
      if (isNaN(bt) || bt <= 0) {
        alert('Burst Time must be a positive number');
        return;
      }
      if (isNaN(at) || at < 0) {
        alert('Arrival Time must be zero or positive number');
        return;
      }
      if (isNaN(priority) || priority < 0) {
        alert('Priority must be zero or positive number');
        return;
      }

      // Check for duplicate PID
      if (processes.some(p => p.pid === pid)) {
        alert('Process ID must be unique');
        return;
      }

      processes.push({ pid, bt, at, priority });

      // Update table
      updateProcessTable();

      // Clear inputs
      document.getElementById('pid').value = '';
      document.getElementById('bt').value = '';
      document.getElementById('at').value = '';
      document.getElementById('priority').value = '';
    }

    function updateProcessTable() {
      const table = document.getElementById('process-table');
      table.innerHTML = '';
      processes.forEach(({ pid, bt, at, priority }) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="border border-blue-300 p-2">${pid}</td>
          <td class="border border-blue-300 p-2">${bt}</td>
          <td class="border border-blue-300 p-2">${at}</td>
          <td class="border border-blue-300 p-2">${priority}</td>
        `;
        table.appendChild(row);
      });
    }

    function simulate() {
      if (processes.length === 0) {
        alert('Please add at least one process before simulation');
        return;
      }

      const algorithm = document.getElementById('algorithm').value;
      const quantum = parseInt(document.getElementById('quantum').value) || 2;
      let chartData = [], resultData = [];

      if (algorithm === 'fcfs') {
        ({ chartData, resultData } = simulateFCFS([...processes]));
      } else if (algorithm === 'sjf') {
        ({ chartData, resultData } = simulateSJF([...processes]));
      } else if (algorithm === 'priority') {
        ({ chartData, resultData } = simulatePriority([...processes]));
      } else if (algorithm === 'rr') {
        ({ chartData, resultData } = simulateRR([...processes], quantum));
      }

      renderGantt(chartData);
      renderResults(resultData);
    }

    function renderGantt(data) {
      const container = document.getElementById('gantt-chart');
      container.innerHTML = '';
      data.forEach(({ pid, start, end }) => {
        const block = document.createElement('div');
        block.className = 'gantt-block';
        block.innerText = pid;
        block.setAttribute('data-time', `${start} - ${end}`);
        // Width proportional to duration (assuming 40px per unit time)
        block.style.minWidth = (end - start) * 40 + 'px';
        container.appendChild(block);
      });
    }

    function renderResults(data) {
      const resultTable = document.getElementById('result-table');
      resultTable.innerHTML = '';
      data.forEach(p => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="border border-blue-300 p-2">${p.pid}</td>
          <td class="border border-blue-300 p-2">${p.wt}</td>
          <td class="border border-blue-300 p-2">${p.tat}</td>
        `;
        resultTable.appendChild(row);
      });
    }

    // Algorithms unchanged except minor fixes to simulateRR for arrival time check

    function simulateFCFS(pList) {
      pList.sort((a, b) => a.at - b.at);
      let time = 0;
      const chartData = [], resultData = [];

      pList.forEach(p => {
        if (time < p.at) time = p.at;
        const start = time;
        time += p.bt;
        const end = time;
        chartData.push({ pid: p.pid, start, end });
        resultData.push({ pid: p.pid, wt: start - p.at, tat: end - p.at });
      });

      return { chartData, resultData };
    }

    function simulateSJF(pList) {
      let time = 0;
      const chartData = [], resultData = [];
      const ready = [];
      pList.sort((a, b) => a.at - b.at);

      while (pList.length > 0 || ready.length > 0) {
        while (pList.length > 0 && pList[0].at <= time) {
          ready.push(pList.shift());
        }
        if (ready.length === 0) {
          time = pList[0].at;
          continue;
        }
        ready.sort((a, b) => a.bt - b.bt);
        const p = ready.shift();
        const start = time;
        time += p.bt;
        const end = time;
        chartData.push({ pid: p.pid, start, end });
        resultData.push({ pid: p.pid, wt: start - p.at, tat: end - p.at });
      }
      return { chartData, resultData };
    }

    function simulatePriority(pList) {
      let time = 0;
      const chartData = [], resultData = [];
      const ready = [];
      pList.sort((a, b) => a.at - b.at);

      while (pList.length > 0 || ready.length > 0) {
        while (pList.length > 0 && pList[0].at <= time) {
          ready.push(pList.shift());
        }
        if (ready.length === 0) {
          time = pList[0].at;
          continue;
        }
        ready.sort((a, b) => a.priority - b.priority);
        const p = ready.shift();
        const start = time;
        time += p.bt;
        const end = time;
        chartData.push({ pid: p.pid, start, end });
        resultData.push({ pid: p.pid, wt: start - p.at, tat: end - p.at });
      }
      return { chartData, resultData };
    }

    function simulateRR(pList, quantum) {
      let time = 0;
      const queue = [], chartData = [], resultData = [];
      pList.sort((a, b) => a.at - b.at);
      const remaining = new Map();
      pList.forEach(p => remaining.set(p.pid, { ...p, remaining: p.bt }));

      while (pList.length > 0 || queue.length > 0) {
        while (pList.length > 0 && pList[0].at <= time) {
          queue.push(pList.shift().pid);
        }
        if (queue.length === 0) {
          time = pList[0]?.at ?? time;
          continue;
        }

 const pid = queue.shift();
    const p = remaining.get(pid);
    const execTime = Math.min(quantum, p.remaining);
    const start = time;
    time += execTime;
    const end = time;
    chartData.push({ pid, start, end });
    p.remaining -= execTime;

    // Add newly arrived processes to queue at current time
    while (pList.length > 0 && pList[0].at <= time) {
      queue.push(pList.shift().pid);
    }

    if (p.remaining > 0) {
      queue.push(pid);
    } else {
      resultData.push({ pid, wt: time - p.at - p.bt, tat: time - p.at });
      remaining.delete(pid);
    }
  }

  // Sort results by pid ascending
  resultData.sort((a, b) => a.pid.localeCompare(b.pid));
  return { chartData, resultData };
}
</script> </body> </html>
