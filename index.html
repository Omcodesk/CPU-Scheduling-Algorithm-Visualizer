<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Process Scheduling Simulator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">
  <div class="max-w-6xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
    <h1 class="text-3xl font-bold text-center mb-6">Process Scheduling Simulator</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="space-y-4">
        <div class="flex flex-col">
          <label class="font-medium">Process ID</label>
          <input id="pid" type="text" class="border px-3 py-2 rounded" />
        </div>
        <div class="flex flex-col">
          <label class="font-medium">Burst Time</label>
          <input id="bt" type="number" class="border px-3 py-2 rounded" />
        </div>
        <div class="flex flex-col">
          <label class="font-medium">Arrival Time</label>
          <input id="at" type="number" class="border px-3 py-2 rounded" />
        </div>
        <div class="flex flex-col">
          <label class="font-medium">Priority (lower = higher)</label>
          <input id="priority" type="number" class="border px-3 py-2 rounded" />
        </div>
        <button onclick="addProcess()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Add Process</button>
      </div>

      <div>
        <label class="font-medium">Algorithm</label>
        <select id="algorithm" class="w-full border px-3 py-2 rounded mb-4">
          <option value="fcfs">FCFS</option>
          <option value="sjf">SJF (Non-preemptive)</option>
          <option value="priority">Priority (Non-preemptive)</option>
          <option value="rr">Round Robin</option>
        </select>
        <label class="font-medium">Time Quantum</label>
        <input id="quantum" type="number" value="2" min="1" class="w-full border px-3 py-2 rounded mb-4" />
        <button onclick="simulate()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 w-full">Simulate</button>
      </div>
    </div>

    <div class="mt-8">
      <h2 class="text-xl font-semibold mb-2">Process Table</h2>
      <table class="w-full table-auto border border-gray-300">
        <thead>
          <tr class="bg-gray-200">
            <th class="p-2 border">PID</th>
            <th class="p-2 border">Burst Time</th>
            <th class="p-2 border">Arrival Time</th>
            <th class="p-2 border">Priority</th>
          </tr>
        </thead>
        <tbody id="process-table"></tbody>
      </table>
    </div>

    <div class="mt-10">
      <h2 class="text-xl font-semibold mb-2">Gantt Chart</h2>
      <div id="gantt-chart" class="flex flex-wrap gap-2"></div>
    </div>

    <div class="mt-10">
      <h2 class="text-xl font-semibold mb-2">Results</h2>
      <table class="w-full table-auto border border-gray-300">
        <thead>
          <tr class="bg-gray-200">
            <th class="p-2 border">PID</th>
            <th class="p-2 border">Waiting Time</th>
            <th class="p-2 border">Turnaround Time</th>
          </tr>
        </thead>
        <tbody id="result-table"></tbody>
      </table>
    </div>
  </div>

  <script>
    const processes = [];

    function addProcess() {
      const pid = document.getElementById('pid').value;
      const bt = parseInt(document.getElementById('bt').value);
      const at = parseInt(document.getElementById('at').value);
      const priority = parseInt(document.getElementById('priority').value);

      if (!pid || isNaN(bt) || isNaN(at) || isNaN(priority)) {
        alert('Please enter valid values for all fields.');
        return;
      }

      processes.push({ pid, bt, at, priority });
      const table = document.getElementById('process-table');
      const row = table.insertRow();
      row.innerHTML = `<td class='border p-2'>${pid}</td><td class='border p-2'>${bt}</td><td class='border p-2'>${at}</td><td class='border p-2'>${priority}</td>`;

      document.getElementById('pid').value = '';
      document.getElementById('bt').value = '';
      document.getElementById('at').value = '';
      document.getElementById('priority').value = '';
    }

    function simulate() {
      const algorithm = document.getElementById('algorithm').value;
      const quantum = parseInt(document.getElementById('quantum').value);
      let chartData = [];
      let resultData = [];

      if (algorithm === 'fcfs') {
        ({ chartData, resultData } = simulateFCFS([...processes]));
      } else if (algorithm === 'sjf') {
        ({ chartData, resultData } = simulateSJF([...processes]));
      } else if (algorithm === 'priority') {
        ({ chartData, resultData } = simulatePriority([...processes]));
      } else if (algorithm === 'rr') {
        ({ chartData, resultData } = simulateRR([...processes], quantum));
      }

      renderGantt(chartData);
      renderResults(resultData);
    }

    function renderGantt(data) {
      const container = document.getElementById('gantt-chart');
      container.innerHTML = '';
      data.forEach(({ pid, start, end }) => {
        const block = document.createElement('div');
        block.className = 'bg-blue-500 text-white px-3 py-1 rounded shadow';
        block.innerText = `${pid} (${start}-${end})`;
        container.appendChild(block);
      });
    }

    function renderResults(data) {
      const resultTable = document.getElementById('result-table');
      resultTable.innerHTML = '';
      data.forEach(p => {
        const row = `<tr>
          <td class='border p-2'>${p.pid}</td>
          <td class='border p-2'>${p.wt}</td>
          <td class='border p-2'>${p.tat}</td>
        </tr>`;
        resultTable.innerHTML += row;
      });
    }

    function simulateFCFS(pList) {
      pList.sort((a, b) => a.at - b.at);
      let time = 0;
      const chartData = [], resultData = [];

      pList.forEach(p => {
        if (time < p.at) time = p.at;
        const start = time;
        time += p.bt;
        const end = time;
        chartData.push({ pid: p.pid, start, end });
        resultData.push({ pid: p.pid, wt: start - p.at, tat: end - p.at });
      });

      return { chartData, resultData };
    }

    function simulateSJF(pList) {
      let time = 0;
      const chartData = [], resultData = [];
      const ready = [];
      pList.sort((a, b) => a.at - b.at);

      while (pList.length > 0 || ready.length > 0) {
        while (pList.length > 0 && pList[0].at <= time) {
          ready.push(pList.shift());
        }
        if (ready.length === 0) {
          time = pList[0].at;
          continue;
        }
        ready.sort((a, b) => a.bt - b.bt);
        const p = ready.shift();
        const start = time;
        time += p.bt;
        const end = time;
        chartData.push({ pid: p.pid, start, end });
        resultData.push({ pid: p.pid, wt: start - p.at, tat: end - p.at });
      }
      return { chartData, resultData };
    }

    function simulatePriority(pList) {
      let time = 0;
      const chartData = [], resultData = [];
      const ready = [];
      pList.sort((a, b) => a.at - b.at);

      while (pList.length > 0 || ready.length > 0) {
        while (pList.length > 0 && pList[0].at <= time) {
          ready.push(pList.shift());
        }
        if (ready.length === 0) {
          time = pList[0].at;
          continue;
        }
        ready.sort((a, b) => a.priority - b.priority);
        const p = ready.shift();
        const start = time;
        time += p.bt;
        const end = time;
        chartData.push({ pid: p.pid, start, end });
        resultData.push({ pid: p.pid, wt: start - p.at, tat: end - p.at });
      }
      return { chartData, resultData };
    }

    function simulateRR(pList, quantum) {
      let time = 0;
      const queue = [], chartData = [], resultData = [];
      pList.sort((a, b) => a.at - b.at);
      const remaining = new Map();
      pList.forEach(p => remaining.set(p.pid, { ...p, remaining: p.bt }));

      while (pList.length > 0 || queue.length > 0) {
        while (pList.length > 0 && pList[0].at <= time) {
          queue.push(pList.shift().pid);
        }
        if (queue.length === 0) {
          time = pList[0].at;
          continue;
        }
        const pid = queue.shift();
        const p = remaining.get(pid);
        const execTime = Math.min(quantum, p.remaining);
        const start = time;
        time += execTime;
        const end = time;
        p.remaining -= execTime;
        chartData.push({ pid, start, end });
        while (pList.length > 0 && pList[0].at <= time) {
          queue.push(pList.shift().pid);
        }
        if (p.remaining > 0) {
          queue.push(pid);
        } else {
          resultData.push({ pid, wt: end - p.at - p.bt, tat: end - p.at });
        }
      }
      return { chartData, resultData };
    }
  </script>
  
</body>
</html>
