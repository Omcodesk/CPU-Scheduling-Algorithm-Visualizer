<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Process Scheduling Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet" />
  <style>
    /* Futuristic Technical Background */
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Roboto', sans-serif;
      color: #eee;
      position: relative;
      background: #0a0f1a; /* dark base */
      overflow-x: hidden;
      padding: 20px;
      /* Remove previous light background */
    }

    /* Glowing animated grid */
    .background-grid {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        linear-gradient(rgba(0, 255, 255, 0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.15) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 10s linear infinite;
      z-index: -1;
    }

    /* Subtle glowing lines */
    .background-lines {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        repeating-linear-gradient(45deg, #00fff7, #00fff7 2px, transparent 2px, transparent 15px),
        repeating-linear-gradient(-45deg, #00d8cc, #00d8cc 2px, transparent 2px, transparent 15px);
      opacity: 0.1;
      animation: linesGlow 6s ease-in-out infinite alternate;
      z-index: -2;
    }

    @keyframes gridMove {
      from { background-position: 0 0, 0 0; }
      to { background-position: 50px 50px, 50px 50px; }
    }

    @keyframes linesGlow {
      from { opacity: 0.1; }
      to { opacity: 0.25; }
    }

    /* Content styles adjusted for readability */
    h2, h3 {
      text-align: center;
      color: #00e5ff; /* bright cyan */
      text-shadow: 0 0 8px #00e5ff;
    }

    form, table, #gantt-chart {
      background: rgba(10, 15, 26, 0.85); /* semi-transparent dark */
      padding: 20px;
      margin: 20px auto;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
      max-width: 800px;
      color: #e0f7fa;
    }

    form input, select, button {
      padding: 10px;
      margin: 5px;
      border-radius: 4px;
      border: 1px solid #00e5ff;
      font-size: 14px;
      background: #022c3f;
      color: #b2ebf2;
      transition: background-color 0.3s ease;
    }

    form input:focus, select:focus {
      background-color: #00bcd4;
      color: #012f3f;
      outline: none;
      border-color: #00e5ff;
      box-shadow: 0 0 8px #00e5ff;
    }

    button {
      background-color: #00e5ff;
      color: #012f3f;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #00acc1;
      color: #e0f7fa;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      color: #b2ebf2;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #004d40;
    }

    th {
      background-color: #00e5ff;
      color: #012f3f;
      text-shadow: none;
    }

    #gantt-chart {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .gantt-block {
      background-color: #00e676;
      color: #012f3f;
      padding: 10px;
      border-radius: 4px;
      min-width: 80px;
      text-align: center;
      box-shadow: 0 0 10px #00e676;
    }

    #quantum-wrapper {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="background-grid"></div>
  <div class="background-lines"></div>

  <h2>Process Scheduling Simulator</h2>

  <form id="process-form">
    <input id="process-id" placeholder="Process ID" required />
    <input id="arrival-time" type="number" min="0" value="0" required placeholder="Arrival Time" />
    <input id="burst-time" type="number" min="1" value="1" required placeholder="Burst Time" />
    <input id="priority" type="number" placeholder="Priority (Optional)" />
    <select id="algorithm-select">
      <option value="fcfs">FCFS</option>
      <option value="sjf">SJF</option>
      <option value="priority">Priority</option>
      <option value="roundRobin">Round Robin</option>
    </select>
    <span id="quantum-wrapper">
      <input id="quantum" type="number" placeholder="Quantum Time" min="1" />
    </span>
    <button type="submit">Add Process</button>
  </form>

  <div style="text-align: center;">
    <button id="run-btn">Run</button>
    <button id="reset-btn">Reset</button>
  </div>

  <h3>Process Table</h3>
  <table id="process-table">
    <thead>
      <tr><th>ID</th><th>Arrival</th><th>Burst</th><th>Priority</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <h3>Results</h3>
  <table id="result-table">
    <thead>
      <tr><th>ID</th><th>Arrival</th><th>Burst</th><th>Completion</th><th>Waiting</th><th>Turnaround</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <h3>Gantt Chart</h3>
  <div id="gantt-chart"></div>

  <script>
  const processForm = document.getElementById('process-form');
  const processTableBody = document.querySelector('#process-table tbody');
  const resultTableBody = document.querySelector('#result-table tbody');
  const ganttChart = document.getElementById('gantt-chart');
  const algorithmSelect = document.getElementById('algorithm-select');
  const quantumWrapper = document.getElementById('quantum-wrapper');
  const quantumInput = document.getElementById('quantum');
  const runBtn = document.getElementById('run-btn');
  const resetBtn = document.getElementById('reset-btn');

  let processes = [];

  algorithmSelect.addEventListener('change', () => {
    quantumWrapper.style.display = algorithmSelect.value === 'roundRobin' ? 'inline' : 'none';
  });

  processForm.addEventListener('submit', e => {
    e.preventDefault();
    const id = document.getElementById('process-id').value;
    const arrival = parseInt(document.getElementById('arrival-time').value);
    const burst = parseInt(document.getElementById('burst-time').value);
    const priority = document.getElementById('priority').value ? parseInt(document.getElementById('priority').value) : null;

    processes.push({ id, arrival, burst, remaining: burst, priority });
    updateProcessTable();
    processForm.reset();
  });

  runBtn.addEventListener('click', () => {
    const algorithm = algorithmSelect.value;
    let result = [];

    if (algorithm === 'fcfs') result = runFCFS([...processes]);
    else if (algorithm === 'sjf') result = runSJF([...processes]);
    else if (algorithm === 'priority') result = runPriority([...processes]);
    else if (algorithm === 'roundRobin') {
      const quantum = parseInt(quantumInput.value);
      if (!quantum) return alert('Quantum time required!');
      result = runRoundRobin([...processes], quantum);
    }

    showResults(result);
  });

  resetBtn.addEventListener('click', () => {
    processes = [];
    processTableBody.innerHTML = '';
    resultTableBody.innerHTML = '';
    ganttChart.innerHTML = '';
  });

  function updateProcessTable() {
    processTableBody.innerHTML = '';
    processes.forEach(p => {
      processTableBody.innerHTML += `<tr>
        <td>${p.id}</td><td>${p.arrival}</td><td>${p.burst}</td><td>${p.priority ?? '-'}</td>
      </tr>`;
    });
  }

  function showResults(results) {
    resultTableBody.innerHTML = '';
    ganttChart.innerHTML = '';

    results.forEach(r => {
      resultTableBody.innerHTML += `<tr>
        <td>${r.id}</td><td>${r.arrival}</td><td>${r.burst}</td>
        <td>${r.completion}</td><td>${r.waiting}</td><td>${r.turnaround}</td>
      </tr>`;
      ganttChart.innerHTML += `<div class="gantt-block">${r.id}<br>${r.start}-${r.end}</div>`;
    });
  }

  function runFCFS(processes) {
    processes.sort((a, b) => a.arrival - b.arrival);
    let time = 0, result = [];

    for (const p of processes) {
      const start = Math.max(time, p.arrival);
      const end = start + p.burst;
      result.push({
        ...p,
        start,
        end,
        completion: end,
        turnaround: end - p.arrival,
        waiting: start - p.arrival
      });
      time = end;
    }
    return result;
  }

  function runSJF(processes) {
    let time = 0, result = [], done = [];
    while (done.length < processes.length) {
      const ready = processes.filter(p => p.arrival <= time && !done.includes(p));
      if (ready.length === 0) {
        time++;
        continue;
      }
      ready.sort((a, b) => a.burst - b.burst);
      const p = ready[0];
      const start = time;
      const end = time + p.burst;
      result.push({
        ...p,
        start,
        end,
        completion: end,
        turnaround: end - p.arrival,
        waiting: start - p.arrival
      });
      done.push(p);
      time = end;
    }
    return result;
  }

  function runPriority(processes) {
    let time = 0, result = [], done = [];
    while (done.length < processes.length) {
      const ready = processes.filter(p => p.arrival <= time && !done.includes(p));
      if (ready.length === 0) {
time++;
continue;
}
ready.sort((a, b) => a.priority - b.priority);
const p = ready[0];
const start = time;
const end = time + p.burst;
result.push({
...p,
start,
end,
completion: end,
turnaround: end - p.arrival,
waiting: start - p.arrival
});
done.push(p);
time = end;
}
return result;
}

function runRoundRobin(processes, quantum) {
let time = 0, queue = [], result = [];
const burstMap = new Map(processes.map(p => [p.id, p.burst]));
let completed = new Set();
while (completed.size < processes.length) {
  processes.forEach(p => {
    if (p.arrival <= time && !queue.includes(p) && !completed.has(p.id)) {
      queue.push(p);
    }
  });

  if (queue.length === 0) {
    time++;
    continue;
  }

  const p = queue.shift();
  const execTime = Math.min(quantum, p.remaining);
  const start = time;
  time += execTime;
  p.remaining -= execTime;

  result.push({
    id: p.id,
    arrival: p.arrival,
    burst: p.burst,
    start,
    end: time,
    completion: null,
    waiting: null,
    turnaround: null
  });

  // Check for newly arrived processes during execution
  processes.forEach(pr => {
    if (pr.arrival > start && pr.arrival <= time && !queue.includes(pr) && !completed.has(pr.id) && pr.remaining > 0) {
      queue.push(pr);
    }
  });

  if (p.remaining > 0) {
    queue.push(p);
  } else {
    completed.add(p.id);
  }
}

// Calculate completion, turnaround, waiting for final output by aggregating blocks
let finalResults = [];
for (const p of processes) {
  const executions = result.filter(r => r.id === p.id);
  const completion = executions[executions.length - 1].end;
  const turnaround = completion - p.arrival;
  const waiting = turnaround - p.burst;
  finalResults.push({
    id: p.id,
    arrival: p.arrival,
    burst: p.burst,
    completion,
    turnaround,
    waiting,
    start: executions[0].start,
    end: completion
  });
}

return finalResults;
}
</script>

</body> </html>
